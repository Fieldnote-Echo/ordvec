name: coverage

# Measure test coverage with cargo-llvm-cov, enforce a regression floor (the
# "Enforce coverage floor" step below), and upload to Codecov for the README
# badge. The upload is informational — fail_ci_if_error is false, so a failed or
# absent upload never blocks a PR. Activate the repo at https://codecov.io to
# surface the dashboard + badge.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: coverage-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  coverage:
    name: coverage (cargo-llvm-cov)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-03-27)
        with:
          toolchain: stable
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install cargo-llvm-cov (pinned)
        run: cargo install cargo-llvm-cov --version 0.8.7 --locked
      - name: Generate coverage (lcov)
        run: cargo llvm-cov --all-features --lcov --output-path lcov.info
      # Regression floor — reuses the profdata from the lcov step above (no
      # re-run, so it's fast) and fails the job if line coverage drops below the
      # floor. A visible regression signal that keeps the OpenSSF silver
      # statement-coverage criterion honest. The floor sits well under the actual
      # line coverage (~89%); raise it as coverage grows.
      - name: Enforce coverage floor
        run: cargo llvm-cov report --fail-under-lines 85
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          files: lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
