# Dependabot version updates. Docs: https://docs.github.com/en/code-security/reference/supply-chain-security/dependabot-options-reference
# Every ecosystem carries a 7-day cooldown: no dependency is bumped same-day, so a
# freshly-published malicious release (the "mini shai-hulud" npm-worm class of
# supply-chain attack) has a week to be flagged/yanked before we'd auto-PR it.
version: 2
updates:
  # PRIMARY TARGET: actions are SHA-pinned in .github/workflows; Dependabot keeps
  # those pins current (and re-pins to the new SHA), just delayed 7 days. One
  # grouped PR keeps the action bumps from flooding the queue.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"

  # Cargo workspace root: core `ordvec` + the `ordvec-python` binding member
  # (single workspace Cargo.lock). Group minor+patch into one PR; majors stay
  # separate for manual review.
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    groups:
      cargo-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # ordvec-python's only runtime dep is numpy, and its floor is a DELIBERATE
  # broad/legacy-compatibility choice: ordvec is dep-light + abi3-py39, and
  # rust-numpy 0.27 supports numpy 1.x AND 2.x at runtime, so we keep numpy
  # >=1.20 (usable on Python 3.9 + numpy 1.x legacy stacks). Raising the floor to
  # 2.x would drop those users (numpy 2.1+ also dropped Python 3.9) for zero gain
  # — ordvec's speed is its Rust kernels; numpy is just the zero-copy array
  # container. So `ignore` numpy to stop Dependabot re-proposing the floor bump.
  # maturin (build dep) updates and security advisories still flow.
  - package-ecosystem: "pip"
    directory: "/ordvec-python"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    groups:
      pip-minor-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Hold the broad numpy floor (see above); do not auto-raise it.
      - dependency-name: "numpy"

  # fuzz/ is a workspace-EXCLUDED standalone crate (own Cargo.lock), nightly-only
  # cargo-fuzz tooling. Dev-only surface, low priority — group all, tight PR limit.
  - package-ecosystem: "cargo"
    directory: "/fuzz"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 2
    groups:
      fuzz-deps:
        patterns:
          - "*"
