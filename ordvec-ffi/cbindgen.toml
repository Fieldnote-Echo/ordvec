language = "C"
include_guard = "ORDVEC_H"
pragma_once = true
autogen_warning = "/* Generated by cbindgen. Do not edit by hand. */"
include_version = true
usize_is_size_t = false
documentation = true
style = "type"
cpp_compat = true

[export]
exclude = ["IndexHandle", "LoadedIndex", "FfiError"]

[parse]
parse_deps = false
